
name: 🔔 ReWear Backend Keep-Alive
 
on:
  schedule:
    # Runs every 8 minutes to keep backend awake
    # Render free tier spins down after 15 minutes of inactivity
    - cron: '*/8 * * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
 
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    name: Keep Backend Awake
    
    steps:
      - name: 📢 Start Keep-Alive Ping
        run: |
          echo "🔔 Pinging ReWear backend at $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      - name: 🎯 Ping Health Endpoint
        run: |
          BACKEND_URL="https://rewear-backend-lxl1.onrender.com"
          
          echo "📍 URL: $BACKEND_URL/health"
          echo "⏰ Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          
          # Make the ping request with timeout and retry
          curl -X GET "$BACKEND_URL/health" \
            -H "User-Agent: GitHub-KeepAlive" \
            -H "Accept: application/json" \
            -H "Connection: close" \
            --max-time 15 \
            --retry 3 \
            --retry-delay 2 \
            --retry-max-time 30 \
            -w "\n\n📊 Response Status: %{http_code}\n⏱️  Response Time: %{time_total}s\n" \
            -v || true
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      - name: ✅ Keep-Alive Completed
        run: |
          echo "✅ Keep-alive ping sent successfully!"
          echo "🎯 Next ping in 8 minutes"
          echo "📅 Last pinged: $(date)"
