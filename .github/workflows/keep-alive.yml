name: 🔔 ReWear Backend Keep-Alive

on:
  schedule:
    - cron: '*/2 * * * *'  # CHANGED: Every 4 minutes (was 8)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    name: Keep Backend Awake
    
    steps:
      - name: 📢 Start Keep-Alive Ping
        run: |
          echo "🔔 Pinging ReWear backend at $(date)"
      
      - name: 🎯 Ping Health Endpoint
        run: |
          BACKEND_URL="https://rewear-backend-1xl1.onrender.com"
          
          # Make the ping request - FAIL if it takes too long
          curl -X GET "$BACKEND_URL/health" \
            -H "User-Agent: GitHub-KeepAlive" \
            -H "Accept: application/json" \
            --max-time 10 \
            --retry 2 \
            --retry-delay 1 \
            -w "\n✅ Status: %{http_code} | Time: %{time_total}s\n"
      
      - name: ✅ Keep-Alive Completed
        run: echo "✅ Ping sent at $(date)"